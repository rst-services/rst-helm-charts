{{- if .Values.virtualService.enabled }}
{{- range .Values.virtualService.routes }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "chart-base.fullname" $ }}-{{ .name }}
  labels:
    {{- include "chart-base.labels" $ | nindent 4 }}
spec:
  hosts:
    {{- range .hosts }}
    - {{ . }}.{{ $.Values.virtualService.domain }}
    {{- end }}
  gateways:
    {{- if $.Values.virtualService.letsEncrypt.enabled }}
    - istio-system/{{ include "chart-base.fullname" $ }}-gateway
    {{- else }}
    - istio-system/{{ $.Values.virtualService.gateway }}
    {{- end }}
  http:
    - match:
        - uri:
            prefix: {{ .prefix }}
      route:
        - destination:
            host: {{ include "chart-base.fullname" $ }}
            port:
              number: {{ .port }}
      {{- with .headers }}
      headers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
