{{/*
PVCs standalone — usados quando kind: Deployment + persistentVolume.enabled.
Para StatefulSet, use statefulSet.volumeClaimTemplates.
*/}}
{{- if and (ne .Values.kind "StatefulSet") .Values.persistentVolume.enabled }}
{{- range .Values.persistentVolume.pvcs }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chart-base.fullname" $ }}-{{ .name }}
  labels:
    {{- include "chart-base.labels" $ | nindent 4 }}
spec:
  accessModes:
    - {{ .accessMode | default "ReadWriteOnce" }}
  {{- if .storageClassName }}
  storageClassName: {{ .storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .size }}
{{- end }}
{{- end }}
