{{- if .Values.virtualService.letsEncrypt.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "chart-base.fullname" . }}-cert
  namespace: istio-system
  labels:
    {{- include "chart-base.labels" . | nindent 4 }}
spec:
  secretName: {{ include "chart-base.fullname" . }}-tls-cert
  duration: 2160h   # 90 dias
  renewBefore: 360h # 15 dias
  isCA: false
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    {{- include "chart-base.gateway.uniqueHosts" . | nindent 4 }}
  issuerRef:
    name: {{ .Values.virtualService.letsEncrypt.issuerName | default "letsencrypt-cluster" }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
