apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zabbix-proxy.fullname" . }}
  labels:
    {{- include "zabbix-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  serviceName: {{ include "zabbix-proxy.fullname" . }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "zabbix-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zabbix-proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "zabbix-proxy.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1997
        runAsNonRoot: true
        runAsUser: 1997
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: zabbix-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: zbx-proxy
              containerPort: 10051
              protocol: TCP
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: zbx-proxy
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            tcpSocket:
              port: zbx-proxy
            initialDelaySeconds: 120
            timeoutSeconds: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/zabbix
            {{- /*
              AIDEV-NOTE: Zabbix 7.4+ cria o SQLite em /var/lib/zabbix/db_data/<host>.sqlite.
              Quando persistence.enabled=false, /var/lib/zabbix é emptyDir vazio e a
              subpasta db_data não existe → entrypoint falha com ENOENT. Auto-injetamos
              um emptyDir extra montado em /var/lib/zabbix/db_data só nesse caso.
              Com PVC (persistence.enabled=true) NÃO injetamos: o PVC já cobre db_data
              como subpasta, e injetar sobreporia com emptyDir efêmero, derrotando
              silenciosamente a persistência.
            */}}
            {{- if not .Values.persistence.enabled }}
            - name: db-data
              mountPath: /var/lib/zabbix/db_data
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- if or (not .Values.persistence.enabled) .Values.extraVolumes }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        - name: db-data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
