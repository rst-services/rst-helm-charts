# =============================================================================
# zabbix-proxy default values
# =============================================================================
# Chart de plumbing k8s (StatefulSet + Service + PVC) para o image
# zabbix/zabbix-proxy-sqlite3. NÃO trata variáveis do Zabbix — toda
# configuração do proxy (ZBX_*) deve vir via `extraEnv`.
#
# Ref env vars: https://hub.docker.com/r/zabbix/zabbix-proxy-sqlite3
# =============================================================================

# -----------------------------------------------------------------------------
# Imagem
# -----------------------------------------------------------------------------
# Default: Zabbix 7.0 LTS (suportado até 2029) — recomendado para produção.
# Para usar 7.4 (current release, features novas), sobrescreva tag: ubuntu-7.4-latest.
# Tags disponíveis: https://hub.docker.com/r/zabbix/zabbix-proxy-sqlite3/tags
image:
  repository: zabbix/zabbix-proxy-sqlite3
  tag: ubuntu-7.0-latest
  pullPolicy: IfNotPresent
imagePullSecrets: []

# -----------------------------------------------------------------------------
# Persistência (SQLite buffer)
# -----------------------------------------------------------------------------
# enabled=false → /var/lib/zabbix vira emptyDir (fila SQLite perdida a cada restart).
# Use só em dev/teste; em produção mantenha enabled=true.
#
# AIDEV-NOTE: quando enabled=false o template auto-injeta um segundo emptyDir
# em /var/lib/zabbix/db_data — Zabbix 7.4+ cria o SQLite nessa subpasta e ela
# não existe num emptyDir raiz vazio, fazendo o pod morrer com ENOENT.
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# -----------------------------------------------------------------------------
# Pod
# -----------------------------------------------------------------------------
replicas: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 10051
  # headless: true → clusterIP: None (DNS estável por pod)
  headless: false

# -----------------------------------------------------------------------------
# ServiceAccount
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Configuração do Zabbix Proxy (env vars ZBX_*)
# -----------------------------------------------------------------------------
# TODA configuração do proxy entra aqui — defaults do image aplicam quando
# não setado. Mínimo recomendado: ZBX_HOSTNAME e ZBX_SERVER_HOST.
# Ref: https://hub.docker.com/r/zabbix/zabbix-proxy-sqlite3
#
# IMPORTANTE: quando ZBX_PROXYBUFFERMODE for "memory" ou "hybrid", o binário
# do Zabbix exige ZBX_PROXYMEMORYBUFFERSIZE. Sem ele o pod sobe e morre com:
#   ERROR: ProxyMemoryBufferSize configuration parameter must be set when
#          ProxyBufferMode parameter is set to "memory" or "hybrid"
# Declare ambos juntos no extraEnv (ver exemplo abaixo).
extraEnv: []
  # - name: ZBX_HOSTNAME
  #   valueFrom:
  #     fieldRef:
  #       fieldPath: metadata.name        # usa o nome do pod (StatefulSet ordinal)
  # - name: ZBX_SERVER_HOST
  #   value: "zabbix.empresa.com.br"
  # - name: ZBX_PROXYMODE
  #   value: "0"                          # 0=active (default) | 1=passive
  # - name: ZBX_PROXYBUFFERMODE
  #   value: "hybrid"                     # disk | memory | hybrid
  # - name: ZBX_PROXYMEMORYBUFFERSIZE
  #   value: "256M"                       # obrigatório se PROXYBUFFERMODE=memory|hybrid
  # - name: ZBX_DEBUGLEVEL
  #   value: "3"
  # - name: ZBX_TIMEOUT
  #   value: "30"

# Volumes/mounts adicionais — útil pra montar Secret de PSK, snippets em
# /etc/zabbix/zabbix_proxy.d, certificados TLS, etc.
extraVolumes: []
  # - name: psk
  #   secret:
  #     secretName: zbx-proxy-psk
  #     items:
  #       - key: proxy.psk
  #         path: proxy.psk
  #         mode: 0400
extraVolumeMounts: []
  # - name: psk
  #   mountPath: /var/lib/zabbix/.psk
  #   readOnly: true
