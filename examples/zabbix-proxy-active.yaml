# Exemplo: Zabbix Proxy modo active (mais comum) para um cliente.
#
# helm install zbx-cliente1 rst/zabbix-proxy -f examples/zabbix-proxy-active.yaml

serverHost: zabbix.empresa.com.br
hostname: PROXY-CLIENTE1
mode: active

persistence:
  size: 5Gi
  storageClass: standard

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

